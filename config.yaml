# config.yaml — 모든 튜닝 파라미터의 단일 출처 (AGENTS.md §1.3: 매직 넘버 금지)
# 코드에서는 src/config.py 로더를 통해서만 이 값을 읽는다.

paths:
  uploads: data/uploads   # 원본 영상
  clips: data/clips       # 모션 클립
  thumbs: data/thumbs     # 썸네일
  db: data/db/events.db   # SQLite 파일
  models: models          # YOLO 가중치 캐시

motion:
  # Frigate 방식 OpenCV 모션 감지 파라미터 (absdiff + blur + threshold + dilate + contourArea)
  # 연산 효율을 위한 리사이즈 폭 (기본 300px, 0이면 리사이즈 없음)
  frame_width: 300
  # 노이즈 제거를 위한 가우시안 블러 크기 (홀수)
  blur_radius: 5
  # 픽셀값 차이 임계값 (0~255 범위, 낮을수록 민감)
  threshold: 25
  # 끊어진 모션 픽셀 영역을 채우기 위한 팽창(dilate) 연산 반복 횟수
  dilate_iterations: 2
  # 모션으로 인정할 최소 윤곽선 면적 (절대 픽셀 단위)
  min_area: 50

  # 최소 이벤트 지속 시간. 1초 미만 깜빡임/오탐 억제. (정수=프레임, "1s"=시간)
  min_event_length: "1s"
  # 이벤트 전후로 덧붙일 시간 (앞쪽 패딩 / 뒤쪽 패딩)
  time_before_event: 0.5   # 초
  time_post_event: 2.0     # 초
  # 이 값(초) 미만 간격의 연속 이벤트를 하나의 구간으로 병합 (0.0 = 병합 비활성화)
  merge_gap_sec: 30.0
  # ROI. 비우면 전체 화면. 다각형 리스트 [x0,y0,x1,y1,...]
  regions: []

detect:
  model: yolo11n.pt        # AGENTS.md §1.2: 확실히 존재하는 가중치. YOLO26 사용 시 문서 확인 후 변경.
  sample_fps: 1.0          # 모션 클립을 초당 N프레임으로 샘플링 (1~2 권장)
  # COCO class id: 0=person, 2=car, 3=motorcycle, 5=bus, 7=truck, 15=cat, 16=dog
  # CCTV 기본: 사람+차량. 실내 전용이면 [0]만 사용.
  classes: [0, 2, 3, 5, 7]
  conf: 0.35               # 탐지 신뢰도 임계값
  device: auto             # auto | cpu | cuda | mps. GPU 미가용 시 cpu fallback.
  # YOLO 확인 필터: true이면 YOLO가 객체를 확인한 이벤트만 저장(노이즈 제거 핵심).
  # false로 바꾸면 모션만 있어도 저장(디버깅·민감도 비교 용도).
  require_detection: true

ingest:
  # ffprobe로 추출한 코덱이 아래 목록이 아니면 표준 MP4(H.264)로 정규화
  standard_codecs: [h264]
  standard_container: mp4
  # 처리 후 정규화 중간 파일(*.normalized.mp4) 삭제 — 디스크 절약 (Phase 8)
  cleanup_normalized: true

notify:
  enabled: false
  webhook_url_env: N8N_WEBHOOK_URL  # 실제 URL은 .env의 이 키에서 읽음
  cooldown_sec: 300                 # 동일 영상 알림 쿨다운(스팸 방지)

logging:
  level: INFO
